name: install-test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Cancel in-flight runs on the same ref when a new commit arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-install:
    name: test-install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v5

      # The script toggles wget/curl/unzip in and out of a sandbox $PATH,
      # so all four tools need to be installed on the host first.
      # Today's GitHub runner images ship all four on both OSes, but install
      # only what's missing so we don't break if a future image drops one.
      - name: Install required tools (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          missing=()
          for t in nano wget curl unzip; do
            command -v "$t" >/dev/null || missing+=("$t")
          done
          if (( ${#missing[@]} )); then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends "${missing[@]}"
          fi

      - name: Install required tools (macOS)
        if: runner.os == 'macOS'
        run: |
          for t in nano wget curl unzip; do
            command -v "$t" >/dev/null || brew install "$t"
          done

      - name: Run install.sh scenarios
        run: |
          chmod +x install.sh tools/test-install.sh
          ./tools/test-install.sh --quiet

  test-install-freebsd:
    name: test-install (freebsd)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      # No native FreeBSD runner exists on GitHub-hosted runners, so
      # vmactions/freebsd-vm spins up a FreeBSD 15 guest under QEMU on
      # the Ubuntu host and rsyncs $GITHUB_WORKSPACE into it. The
      # `prepare:` block runs once on first boot; `run:` is the actual
      # test, executed inside the VM with $PWD = the synced workspace.
      - name: Test install in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          # FreeBSD <14 defaults to tcsh, which mishandles array-style
          # parameter expansion; force /bin/sh for the run script.
          usesh: true
          # We don't need the VM's filesystem mirrored back to the host
          # after the run — saves a noticeable chunk of CI time.
          copyback: false
          prepare: |
            pkg install -y bash unzip curl wget nano
          run: |
            # Print VM context up front so any future failure log has the
            # exact OS / bash / tool versions the job ran against.
            freebsd-version
            uname -a
            bash --version | head -1
            curl --version | head -1
            for t in unzip wget nano; do
              command -v "$t" && "$t" --version | head -1
            done
            chmod +x install.sh tools/test-install.sh
            # NOTE: --quiet deliberately omitted here (unlike the Linux/macOS
            # matrix) — the FreeBSD job is newer and we want install.sh's
            # full stdout/stderr in the log if a scenario fails.
            ./tools/test-install.sh
