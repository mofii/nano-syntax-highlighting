name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# Don't cancel an in-flight release: if a release PR merge is being processed,
# we want it to finish creating the tag/release before another push triggers us.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
